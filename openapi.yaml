  /builds:
    get:
      summary: List builds
      operationId: listBuilds
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Build"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a new build
      description: |
        Creates a new build job. Source code should be uploaded as a tar.gz archive
        in the multipart form data.
      operationId: createBuild
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - source
              properties:
                source:
                  type: string
                  format: binary
                  description: Source tarball (tar.gz) containing application code and optionally a Dockerfile
                dockerfile:
                  type: string
                  description: Dockerfile content. Required if not included in the source tarball.
                base_image_digest:
                  type: string
                  description: Optional pinned base image digest
                cache_scope:
                  type: string
                  description: Tenant-specific cache key prefix
                timeout_seconds:
                  type: integer
                  description: Build timeout (default 600)
                secrets:
                  type: string
                  description: |
                    JSON array of secret references to inject during build.
                    Each object has "id" (required) for use with --mount=type=secret,id=...
                    Example: [{"id": "npm_token"}, {"id": "github_token"}]
                is_admin_build:
                  type: string
                  description: |
                    Set to "true" to grant push access to global cache (operator-only).
                    Admin builds can populate the shared global cache that all tenant builds read from.
                global_cache_key:
                  type: string
                  description: |
                    Global cache identifier (e.g., "node", "python", "ubuntu", "browser").
                    When specified, the build will import from cache/global/{key}.
                    Admin builds will also export to this location.
      responses:
        202:
          description: Build created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /builds/{id}:
    get:
      summary: Get build details
      operationId: getBuild
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Build ID
      responses:
        200:
